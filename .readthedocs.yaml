version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    pre_build:
      - python -c "import pathlib, compileall, sys; dirs=['robustcov','examples','benchmarks','docs']; ok=all(compileall.compile_dir(d, quiet=1, force=True) for d in dirs if pathlib.Path(d).exists()); sys.exit(0 if ok else 1)"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
        - examples
