version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    pre_build:
      - python -m compileall -q robustcov
      - python -m compileall -q examples
      - python -m compileall -q benchmarks
      - python -m compileall -q docs

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
        - examples
